# ===============================
# SERVER CONFIG
# ===============================
server.port=${SERVER_PORT:8080}

# ===============================
# DATABASE CONFIG
# ===============================
# ⚠️ DEVELOPMENT-ONLY DEFAULTS - NEVER USE IN PRODUCTION!
# For production, set these via environment variables!
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/tourly_db?sslMode=DISABLED&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata}
spring.datasource.username=${DB_USERNAME:tourly_user}
spring.datasource.password=${DB_PASSWORD:Tourly@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# CONNECTION POOL (HikariCP) CONFIG
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.leak-detection-threshold=30000

# ===============================
# JPA / HIBERNATE CONFIG
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# ===============================
# FLYWAY CONFIG
# ===============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.clean-disabled=${FLYWAY_CLEAN_DISABLED:true}
spring.flyway.repair-on-migrate=true

# ===============================
# JWT CONFIG
# ===============================
# ⚠️ DEVELOPMENT-ONLY DEFAULT - NEVER USE IN PRODUCTION!
# For production, set a strong secret via JWT_SECRET env var!
# Generate secure secret: openssl rand -base64 64
jwt.secret=${JWT_SECRET:dev-only-jwt-secret-key-change-in-production-immediately-256bits}
jwt.expiration=${JWT_EXPIRATION:3600000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ===============================
# RAZORPAY CONFIG
# ===============================
razorpay.key=${RAZORPAY_KEY:}
razorpay.secret=${RAZORPAY_SECRET:}
razorpay.webhook.secret=${RAZORPAY_WEBHOOK_SECRET:}

# ===============================
# FILE UPLOAD CONFIG
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Cloudinary config (frontend uploads directly — backend stores URLs only)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:roamaya}
cloudinary.upload-preset=${CLOUDINARY_UPLOAD_PRESET:roamaya_trips}

# Increased limits for rich trip creation JSON payload
server.tomcat.max-http-form-post-size=50MB
server.tomcat.max-swallow-size=50MB
server.tomcat.connection-timeout=30000
file.upload-dir=uploads/

# ===============================
# JACKSON CONFIG
# ===============================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata

# ===============================
# LOGGING CONFIG
# ===============================
logging.level.root=INFO
logging.level.com.tourly=${LOG_LEVEL_APP:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:WARN}
logging.level.org.hibernate.SQL=${LOG_LEVEL_SQL:WARN}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${LOG_LEVEL_SQL_BINDER:WARN}

# ===============================
# SWAGGER / SPRINGDOC CONFIG
# ===============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ===============================
# GOOGLE OAUTH CONFIG
# ===============================
google.client-id=${GOOGLE_CLIENT_ID:}
google.client-secret=${GOOGLE_CLIENT_SECRET:}
google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/api/auth/google/callback}

# ===============================
# EMAIL / SMTP CONFIG (Transactional Notifications)
# ===============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:roamayaofficial@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# App-level mail settings
app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from-name=${MAIL_FROM_NAME:Roamaya}
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.mail.from=${MAIL_FROM:noreply@roamaya.com}
# app.mail.enabled=${MAIL_ENABLED:false}

# ===============================
# RATE LIMITING CONFIG
# ===============================
app.rate-limit.auth.requests-per-minute=${RATE_LIMIT_AUTH_RPM:10}
app.rate-limit.auth.block-duration-minutes=${RATE_LIMIT_BLOCK_MINUTES:15}

# ===============================
# CORS CONFIG
# ===============================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:3002}

# ===============================
# COOKIE CONFIG (Auth tokens)
# ===============================
# ⚠️ DEVELOPMENT-ONLY DEFAULT - NEVER USE IN PRODUCTION!
# For production, set COOKIE_SECURE=true via env var!
app.cookie.secure=${COOKIE_SECURE:false}
app.cookie.domain=${COOKIE_DOMAIN:}

# ===============================
# FRONTEND URL (for email links)
# ===============================
app.frontend-url=${FRONTEND_URL:http://localhost:3000}