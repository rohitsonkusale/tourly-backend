# ===============================
# SERVER CONFIG
# ===============================
server.port=8080

# ===============================
# DATABASE CONFIG
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/tourly_db
spring.datasource.username=tourly_user
spring.datasource.password=Tourly@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE CONFIG
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# ===============================
# FLYWAY CONFIG
# ===============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=5

# ===============================
# JWT CONFIG
# ===============================
jwt.secret=TourlySuperSecureJWTSecretKeyForProduction12345
jwt.expiration=3600000

# ===============================
# RAZORPAY CONFIG
# (Used by RazorpayConfig bean + Webhook verification)
# ===============================
razorpay.key=rzp_test_xxxxxxxxx
razorpay.secret=xxxxxxxxxxxx
razorpay.webhook.secret=your_webhook_secret

# ===============================
# FILE UPLOAD CONFIG (for current local uploads)
# Useful before Phase 2 cloud migration
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JSON body size limit — needed for base64 image payloads in KYC form
server.tomcat.max-http-form-post-size=20MB
server.tomcat.max-swallow-size=20MB
file.upload-dir=uploads/

# ===============================
# JACKSON CONFIG
# ===============================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata

# ===============================
# LOGGING CONFIG
# ===============================
logging.level.root=INFO
logging.level.com.tourly=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===============================
# SWAGGER / SPRINGDOC CONFIG
# ===============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ===============================
# OPTIONAL: ACTUATOR (enable later if added dependency)
# ===============================
# management.endpoints.web.exposure.include=health,info
# management.endpoint.health.show-details=always

# ===============================
# GOOGLE OAUTH2
