# ============================================
# TOURLY BACKEND - PRODUCTION CONFIGURATION
# ============================================
# ⚠️ ALL SECRETS MUST BE SET VIA ENVIRONMENT VARIABLES
# ⚠️ NO DEFAULTS FOR SENSITIVE VALUES IN PRODUCTION!
# ============================================

# ------------------------------
# Server & HTTPS
# ------------------------------
server.port=${SERVER_PORT:8080}
# Enforce HTTPS in production!
server.forward-headers-strategy=native
server.tomcat.remote-ip-header=X-Forwarded-For
server.tomcat.protocol-header=X-Forwarded-Proto

# ------------------------------
# Database (Production)
# ------------------------------
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Enable SSL/TLS for production database connections
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=60000

# ------------------------------
# JPA/Hibernate (Production)
# ------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ------------------------------
# JWT Configuration (Production)
# ------------------------------
# NO DEFAULT! Must set via JWT_SECRET env var!
# Generate with: openssl rand -base64 64
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ------------------------------
# Cookie Security (Production)
# ------------------------------
app.cookie.secure=true
app.cookie.domain=${COOKIE_DOMAIN}

# ------------------------------
# CORS (Production - STRICT)
# ------------------------------
# Must set via CORS_ALLOWED_ORIGINS env var (comma-separated list)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# ------------------------------
# Logging (Production)
# ------------------------------
logging.level.root=WARN
logging.level.com.tourly=INFO
logging.level.org.springframework.security=WARN

# ------------------------------
# Spring Boot Actuator (Production Monitoring)
# ------------------------------
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.health.db.enabled=true
management.health.diskspace.enabled=true
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true
