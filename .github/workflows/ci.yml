# ============================================
# Tourly Backend — CI/CD Pipeline
# Triggers: Push to main/develop, PRs to main
# Jobs: Build & Test → Docker → Deploy
# ============================================

name: Backend CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: "21"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Cancel previous runs on the same branch/PR to save resources
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────
  # Job 1: Build & Test
  # ─────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: tourly_test_db
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_password
          MYSQL_ROOT_PASSWORD: root_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
          --health-start-period=30s

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: "maven"

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Build with Maven (compile + package)
        run: ./mvnw package -DskipTests -B --no-transfer-progress

      - name: Run tests
        env:
          DB_URL: jdbc:mysql://localhost:3306/tourly_test_db
          DB_USERNAME: test_user
          DB_PASSWORD: test_password
          JWT_SECRET: ci-test-secret-key-256-bit-minimum-length-for-hmac-sha256-algorithm
          JWT_EXPIRATION: "3600000"
          JWT_REFRESH_EXPIRATION: "604800000"
          RAZORPAY_KEY: rzp_test_fake
          RAZORPAY_SECRET: fake_secret_for_ci
          RAZORPAY_WEBHOOK_SECRET: fake_webhook_for_ci
          GOOGLE_CLIENT_ID: fake-google-client-id.apps.googleusercontent.com
          GOOGLE_CLIENT_SECRET: fake-google-secret
          CORS_ALLOWED_ORIGINS: http://localhost:3000
          MAIL_ENABLED: "false"
          FLYWAY_CLEAN_DISABLED: "false"
        run: ./mvnw verify -B --no-transfer-progress

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 5

  # ─────────────────────────────────────────
  # Job 2: Docker Build & Push
  # ─────────────────────────────────────────
  docker:
    name: Docker Build & Push
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # Job 3: Deploy to Production
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Production
    needs: docker
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e

            cd /opt/roamaya

            echo "── Pulling latest backend code..."
            git pull origin main

            echo "── Rebuilding backend container..."
            docker compose build backend --no-cache
            docker compose up -d backend --no-deps --force-recreate

            echo "── Waiting for health check (60s)..."
            SECONDS=0
            while [ $SECONDS -lt 60 ]; do
              if docker compose ps backend | grep -q "healthy"; then
                echo "✅ Backend deployed successfully (${SECONDS}s)"
                exit 0
              fi
              sleep 5
            done

            echo "❌ Backend failed health check after 60s"
            docker compose logs --tail=50 backend
            exit 1

      - name: Notify deployment failure
        if: failure()
        run: echo "::error::Production deployment failed. Check server logs."
