# ===============================
# PRODUCTION PROFILE — Tourly Backend
# Activate with: SPRING_PROFILES_ACTIVE=prod
# All secrets MUST come from environment variables.
# ===============================

# ── Security ──
spring.flyway.clean-disabled=true
spring.jpa.show-sql=false

# ── HTTPS Enforcement (behind reverse proxy) ──
# Trust X-Forwarded-* headers from Nginx proxy
server.forward-headers-strategy=native
server.tomcat.redirect-context-root=true

# Force HTTPS (Spring Security HSTS is handled by Nginx,
# but this ensures Spring generates HTTPS-based redirects)
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=lax

# ── Logging (production-safe) ──
logging.level.root=WARN
logging.level.com.tourly=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# ── Swagger (disabled in production) ──
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}

# ── Connection pool tuning ──
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:20}
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# ── Server hardening ──
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ── Validation: Fail fast if required secrets are missing ──
# Spring will refuse to start if these are empty
spring.config.import=optional:file:.env[.properties]
