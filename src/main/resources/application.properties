# ===============================
# SERVER CONFIG
# ===============================
server.port=${SERVER_PORT:8080}

# ===============================
# DATABASE CONFIG
# ===============================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/tourly_db}
spring.datasource.username=${DB_USERNAME:tourly_user}
spring.datasource.password=${DB_PASSWORD:Tourly@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE CONFIG
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# ===============================
# FLYWAY CONFIG
# ===============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.clean-disabled=${FLYWAY_CLEAN_DISABLED:false}

# ===============================
# JWT CONFIG
# ===============================
jwt.secret=${JWT_SECRET:TourlySuperSecureJWTSecretKeyForProduction12345}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ===============================
# RAZORPAY CONFIG
# ===============================
razorpay.key=${RAZORPAY_KEY:rzp_test_T418MD1nkTsp5t}
razorpay.secret=${RAZORPAY_SECRET:h3j4WMBMYZ9vgVLBb5eQN13Q}
razorpay.webhook.secret=${RAZORPAY_WEBHOOK_SECRET:your_webhook_secret}

# ===============================
# FILE UPLOAD CONFIG
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Cloudinary config (frontend uploads directly — backend stores URLs only)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:roamaya}
cloudinary.upload-preset=${CLOUDINARY_UPLOAD_PRESET:roamaya_trips}

# Increased limits for rich trip creation JSON payload
server.tomcat.max-http-form-post-size=50MB
server.tomcat.max-swallow-size=50MB
server.tomcat.connection-timeout=120000
file.upload-dir=uploads/

# ===============================
# JACKSON CONFIG
# ===============================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata

# ===============================
# LOGGING CONFIG
# ===============================
logging.level.root=INFO
logging.level.com.tourly=${LOG_LEVEL_APP:DEBUG}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:DEBUG}
logging.level.org.hibernate.SQL=${LOG_LEVEL_SQL:DEBUG}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${LOG_LEVEL_SQL_BINDER:TRACE}

# ===============================
# SWAGGER / SPRINGDOC CONFIG
# ===============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ===============================
# GOOGLE OAUTH CONFIG
# ===============================
google.client-id=${GOOGLE_CLIENT_ID:1055994397285-7qpej7luor7q98mhv0tkenmh8eiqopst.apps.googleusercontent.com}
google.client-secret=${GOOGLE_CLIENT_SECRET:YOUR_GOOGLE_CLIENT_SECRET}
google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/api/auth/google/callback}

# ===============================
# CORS CONFIG
# ===============================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:3002}